name: 지진 데이터 수집 (기상청 JMA)

on:
  schedule:
    - cron: '0 * * * *'   # 매시간 정각 실행 (UTC)
  workflow_dispatch:        # 수동 실행 버튼

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v6

      - name: Python 설정
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: 의존성 설치
        run: pip install requests

      - name: 지진 데이터 수집
        run: python collect.py

      - name: 변경사항 커밋 & 푸시
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/earthquakes.json
          git diff --staged --quiet || git commit -m "chore: 지진 데이터 갱신 $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
